name: Legal Briefing CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install & Build
        run: |
          npm install
          npm run build

      # 만약 어제 Vercel 홈페이지 안 들어가고 성공하셨다면
      # Vercel이 깃허브 Push를 감지해서 따로 배포하고 있을 겁니다.
      # 이 액션은 "빌드가 깨지지 않았는지" 확인하는 용도로만 작동하게 둡니다.
