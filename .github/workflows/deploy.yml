name: Legal Briefing CI/CD

on:
  push:
    branches: ["main"]

# GitHub Pages 배포 권한 (이게 없으면 성공해도 404가 뜹니다)
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build with Next.js
        run: npm run build # 여기서 'out' 폴더가 생성됩니다.

      # [중요] 생성된 out 폴더를 깃허브 서버에 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # 로컬에서 확인하신 그 'out' 폴더입니다.

      # 실제 배포 진행
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
